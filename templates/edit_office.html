<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>עריכת משרד</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='nav_button.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}">
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="left">
        <a href="{{ url_for('web.list_offices') }}"><button class="btn">חזור לרשימת המשרדים</button></a>
      </div>
      <div class="right">
        <h1 style="margin:0;">עריכת משרד מס' {{ office.id }}</h1>
      </div>
    </div>

    <div class="card">
      <form class="form-row" action="{{ url_for('web.edit_office_page', office_id=office.id) }}" method="POST">
        <div class="field">
          <label>קומה</label>
          <input type="number" name="office_floor" value="{{ office.floor }}" required>
        </div>
        <div class="field">
          <label>מספר חדר</label>
          <input type="text" name="office_room_number" value="{{ office.room_number }}" required>
        </div>
        <div class="field">
          <label>קיבולת מקסימלית של עובדים</label>
          <input type="number" name="office_capacity" value="{{ office.capacity }}" required>
        </div>
        <div class="field" style="min-width: 140px;">
          <label>&nbsp;</label>
          <button class="btn" type="submit">שמור שינויים</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
