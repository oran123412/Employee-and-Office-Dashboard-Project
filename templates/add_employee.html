<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='nav_button.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='ui.css') }}">
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="left">
        <a href="{{ url_for('web.home') }}"><button class="btn">Back</button></a>
      </div>
      <div class="right">
        <h1 style="margin:0;">Add employee</h1>
      </div>
    </div>

    <div class="card">
      <form class="form-row" action="{{ url_for('web.manage_add_employee') }}" method="POST">
        <div class="field">
          <label>employee name</label>
          <input type="text" name="emp_name" required>
        </div>
        <div class="field">
          <label>department name</label>
          <input type="text" name="emp_department" required>
        </div>
        <div class="field">
          <label>hire date</label>
          <input type="date" name="emp_hire_date" required>
        </div>
        <div class="field">
          <label>salary</label>
          <input type="number" step="0.01" name="emp_salary" required>
        </div>
        <div class="field">
          <label>office id</label>
          <input type="number" name="emp_office_id">
        </div>
        <div class="field" style="min-width: 120px;">
          <label>&nbsp;</label>
          <button class="btn" type="submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
